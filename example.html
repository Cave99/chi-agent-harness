<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>RadiantAI | Premium Editorial Chat</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#6d4700",
                        "tertiary-container": "#969494",
                        "secondary": "#825500",
                        "on-tertiary-fixed": "#1b1c1c",
                        "surface-container-high": "#e8e8e8",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "secondary-container": "#ffb233",
                        "on-primary-fixed": "#390c00",
                        "surface-container-highest": "#e2e2e2",
                        "primary-container": "#ff6024",
                        "error-container": "#ffdad6",
                        "outline": "#8f7067",
                        "on-tertiary-fixed-variant": "#474746",
                        "inverse-surface": "#2f3131",
                        "tertiary-fixed": "#e5e2e1",
                        "on-secondary-fixed-variant": "#624000",
                        "surface-bright": "#f9f9f9",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#832600",
                        "on-error": "#ffffff",
                        "on-background": "#1a1c1c",
                        "surface-container-low": "#f3f3f3",
                        "on-surface": "#1a1c1c",
                        "surface-dim": "#dadada",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#ffddb3",
                        "surface-variant": "#e2e2e2",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#571600",
                        "primary-fixed": "#ffdbd0",
                        "surface": "#f9f9f9",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "inverse-primary": "#ffb59d",
                        "outline-variant": "#e3bfb3",
                        "on-secondary-fixed": "#291800",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#eeeeee",
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-fixed-dim": "#ffb94f",
                        "background": "#f9f9f9",
                        "surface-tint": "#ac3500",
                        "primary": "#ac3500",
                        "on-surface-variant": "#5a4138",
                        "on-tertiary-container": "#2d2d2d",
                        "primary-fixed-dim": "#ffb59d",
                        "tertiary": "#5f5e5e"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        h1,
        h2,
        h3,
        .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-surface text-on-surface selection:bg-secondary-fixed">
    <div class="flex h-screen overflow-hidden">
        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col relative bg-surface-container-low overflow-hidden">
            <!-- TopAppBar Component -->
            <header
                class="fixed top-0 right-0 left-0 z-50 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-xl shadow-sm shadow-orange-900/5 px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <button class="p-2 hover:bg-orange-50/50 rounded-full" style="">
                        <span class="material-symbols-outlined text-orange-600" style="">menu</span>
                    </button>
                    <h1 class="font-['Plus_Jakarta_Sans'] font-black text-xl tracking-tight text-orange-600 dark:text-orange-500"
                        style="">RadiantAI</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        class="p-2 text-neutral-500 hover:text-orange-400 hover:bg-orange-50/50 transition-colors active:scale-95 duration-200"
                        style="">
                        <span class="material-symbols-outlined" data-icon="tune" style="">tune</span>
                    </button>
                    <button
                        class="p-2 text-neutral-500 hover:text-orange-400 hover:bg-orange-50/50 transition-colors active:scale-95 duration-200"
                        style="">
                        <span class="material-symbols-outlined" data-icon="more_vert" style="">more_vert</span>
                    </button>
                    <div class="ml-4 w-10 h-10 rounded-full overflow-hidden border-2 border-white">
                        <img alt="User Profile" class="w-full h-full object-cover"
                            data-alt="professional portrait of a creative woman with glasses in a bright architectural studio setting"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD36FMLnri5PYbArAb9XN97fY4_ELRLOE9x9K66sRwm2T4D3GHpErBfs1W3NYEE4IDl3vHDI_b50uSvcRz4P7Ii8aRjvr2kdpKidA_UyMPLV3Wm5xuh5EvR2tlfjqHddXcpXnoeeNGM-S2ZMuyRFZvfqEoLcapTiS7eksyPXK7jJFzXJtO3hPP1XuWRUmrl0xGPpri3G8tMobiJJpeuvHKQZs0YDNtqkiCctPDqJCiJwaGipD3dBVAKPPAdyH5AQAhNIw6CCejM4tE"
                            style="" />
                    </div>
                </div>
            </header>
            <!-- Centered Empty State Canvas -->
            <section class="flex-1 flex flex-col items-center justify-center px-6 md:px-12">
                <div class="max-w-3xl w-full text-center space-y-8">
                    <!-- Branding Icon -->
                    <div
                        class="inline-flex w-16 h-16 rounded-full bg-gradient-to-br from-primary to-primary-container items-center justify-center shadow-2xl shadow-primary/30 mb-2">
                        <span class="material-symbols-outlined text-white text-3xl"
                            style='font-variation-settings: "FILL" 1;'>bolt</span>
                    </div>
                    <!-- Welcoming Headline -->
                    <div class="space-y-4">
                        <h2 class="text-4xl md:text-5xl lg:text-6xl font-headline font-black text-on-surface leading-tight"
                            style="">Chi Explorer</h2>
                        <p class="text-lg md:text-xl text-on-surface-variant max-w-2xl mx-auto font-medium opacity-80"
                            style="">Ask a business question in plain English to get an AI-powered answer drawn from the
                            actual content of your calls. Analyze scripts, trends, and customer behaviors at scale.</p>
                    </div>
                    <!-- Suggestion Chips -->
                    <div class="flex flex-wrap justify-center gap-3 pt-4">
                        <button
                            class="px-5 py-2 rounded-full border border-outline-variant hover:bg-primary/5 hover:border-primary transition-all text-sm font-headline font-bold text-on-surface-variant hover:text-primary"
                            style="">
                            Refine typography guidelines
                        </button>
                        <button
                            class="px-5 py-2 rounded-full border border-outline-variant hover:bg-primary/5 hover:border-primary transition-all text-sm font-headline font-bold text-on-surface-variant hover:text-primary"
                            style="">
                            Draft a social campaign
                        </button>
                        <button
                            class="px-5 py-2 rounded-full border border-outline-variant hover:bg-primary/5 hover:border-primary transition-all text-sm font-headline font-bold text-on-surface-variant hover:text-primary"
                            style="">
                            Explain intentional asymmetry
                        </button>
                    </div>
                </div>
            </section>
            <!-- Bottom Input Bar -->
            <div class="p-6 md:p-8 bg-gradient-to-t from-surface via-surface/95 to-transparent">
                <div class="max-w-4xl mx-auto">
                    <div
                        class="relative flex items-end gap-3 p-3 bg-white rounded-2xl shadow-2xl shadow-primary/10 ring-1 ring-neutral-200">
                        <button class="p-3 text-neutral-400 hover:text-primary transition-colors" style="">
                            <span class="material-symbols-outlined" style="">attach_file</span>
                        </button>
                        <textarea
                            class="w-full border-0 bg-transparent py-3 px-1 focus:ring-0 text-on-surface placeholder:text-neutral-400 text-xl resize-none"
                            placeholder="Message Editorial AI..." rows="1"></textarea>
                        <button
                            class="p-4 bg-primary text-white rounded-xl flex items-center justify-center hover:bg-surface-tint active:scale-95 transition-all shadow-lg shadow-primary/30"
                            style="">
                            <span class="material-symbols-outlined"
                                style='font-variation-settings: "FILL" 1;'>send</span>
                        </button>
                    </div>
                    <div class="flex justify-center gap-6 mt-4 px-2">
                        <button
                            class="text-[11px] font-headline font-bold tracking-widest uppercase text-neutral-500 hover:text-primary flex items-center gap-1.5 transition-colors"
                            style="">
                            <span class="material-symbols-outlined text-base" style="">history_edu</span> Narrative Mode
                        </button>
                        <button
                            class="text-[11px] font-headline font-bold tracking-widest uppercase text-neutral-500 hover:text-primary flex items-center gap-1.5 transition-colors"
                            style="">
                            <span class="material-symbols-outlined text-base" style="">analytics</span> Data Synthesis
                        </button>
                        <button
                            class="text-[11px] font-headline font-bold tracking-widest uppercase text-neutral-500 hover:text-primary flex items-center gap-1.5 transition-colors"
                            style="">
                            <span class="material-symbols-outlined text-base" style="">brush</span> Creative Polish
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
